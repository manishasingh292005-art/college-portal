<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
  <h2 class="text-primary mb-4">Student Registration</h2>
  <form id="registerForm">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" id="name" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Course</label>
      <input type="text" id="course" name="course" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Year</label>
      <input type="number" id="year" name="year" class="form-control" min="1" max="4" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Register</button>
    <p id="msg" class="mt-3 text-success fw-bold"></p>
  </form>
</div>
<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      course: document.getElementById('course').value,
      year: document.getElementById('year').value
    };
    console.log('Sending data:', data);
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await res.json();
    document.getElementById('msg').textContent = result.message;
  });
</script>
</body>
</html>
